<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <meta name="robots" content="noindex">
  <title>管理コンソール ｜ TUNDE INC.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

  <!-- パスコードゲート -->
  <div class="gate" id="gate">
    <div class="gate-box">
      <div class="seal">綴</div>
      <h1>管理コンソール</h1>
      <p>TUNDE INC. — ADMIN CONSOLE</p>
      <form id="gateForm">
        <input type="password" id="gatePass" placeholder="パスコード" autocomplete="off" autofocus>
        <button type="submit">入 室</button>
      </form>
      <div class="gate-error" id="gateError"></div>
      <a class="back" href="index.html">← 閲覧画面へ戻る</a>
    </div>
  </div>

  <!-- ヘッダー -->
  <header class="admin-head">
    <span class="mark">TUNDE<em>・</em>INC <span class="sub">ADMIN CONSOLE</span></span>
    <span class="dirty-dot" id="dirtyDot">● 未保存の変更あり</span>
    <span class="spacer"></span>
    <button class="btn btn--ghost" id="btnToken">トークン設定</button>
    <button class="btn btn--ghost" id="btnExport">JSON書出</button>
    <button class="btn btn--ghost" id="btnImport">JSON読込</button>
    <input type="file" id="importFile" accept=".json" hidden>
    <button class="btn" onclick="location.href='index.html'">閲覧画面</button>
    <button class="btn btn--primary" id="btnSave">GitHubに保存</button>
  </header>

  <!-- 本体 -->
  <main class="admin-main">
    <div class="tabs">
      <button class="tab on" data-tab="projects">案件</button>
      <button class="tab" data-tab="tasks">作業</button>
      <button class="tab" data-tab="members">人員</button>
    </div>
    <div id="adminApp">
      <div class="loading">読 み 込 み 中 …</div>
    </div>
  </main>

  <!-- 編集モーダル -->
  <div class="modal-wrap" id="modalWrap">
    <div class="modal" id="modalBody"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/github.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
